name: vCluster E2E Setup

on:
  workflow_call:
    inputs:
      action:
        description: '"setup" or "teardown"'
        required: true
        type: string
      run-id:
        description: 'Unique ID for this run (use github.run_id)'
        required: true
        type: string
      vcluster-version:
        description: 'vCluster chart version'
        required: false
        type: string
        default: '0.32.1'
      k3d-version:
        description: 'k3d version to install'
        required: false
        type: string
        default: 'v5.7.4'
    outputs:
      kubeconfig:
        description: 'base64-encoded kubeconfig scoped to the vCluster'
        value: ${{ jobs.run.outputs.kubeconfig }}
      vcluster-name:
        description: 'Name of the provisioned vCluster'
        value: ${{ jobs.run.outputs.vcluster-name }}

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      kubeconfig: ${{ steps.set-outputs.outputs.kubeconfig }}
      vcluster-name: ${{ steps.set-outputs.outputs.vcluster-name }}
    steps:
      - name: Checkout k3d-manager
        uses: actions/checkout@v4

      - name: Install k3d
        if: inputs.action == 'setup' || inputs.action == 'teardown'
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh \
            | TAG=${{ inputs.k3d-version }} sudo bash

      - name: Install kubectl
        if: inputs.action == 'setup' || inputs.action == 'teardown'
        uses: azure/setup-kubectl@v4

      - name: Setup
        if: inputs.action == 'setup'
        env:
          RUN_ID: ${{ inputs.run-id }}
          VCLUSTER_VERSION: ${{ inputs.vcluster-version }}
        run: |
          set -euo pipefail
          cluster="e2e-${RUN_ID}"
          k3d cluster create "$cluster" --no-lb --wait
          ./scripts/k3d-manager vcluster_install_cli
          ./scripts/k3d-manager vcluster_create "$cluster"
          ./scripts/k3d-manager vcluster_use "$cluster"
          kubeconfig=$(kubectl config view --raw | base64 -w0)
          {
            echo "kubeconfig=$kubeconfig"
            echo "vcluster-name=$cluster"
          } >> "$GITHUB_OUTPUT"

      - name: Teardown
        if: inputs.action == 'teardown'
        env:
          RUN_ID: ${{ inputs.run-id }}
        run: |
          set -euo pipefail
          cluster="e2e-${RUN_ID}"
          k3d cluster create "$cluster" --no-lb --wait >/dev/null 2>&1 || true
          kubectl config use-context "k3d-${cluster}" || true
          ./scripts/k3d-manager vcluster_destroy "$cluster" || true
          k3d cluster delete "$cluster" || true

      - name: Set outputs
        id: set-outputs
        if: inputs.action == 'setup'
        run: |
          set -euo pipefail
          echo "kubeconfig=${{ steps.run.outputs.kubeconfig || '' }}" >> "$GITHUB_OUTPUT"
          echo "vcluster-name=${{ steps.run.outputs.vcluster-name || '' }}" >> "$GITHUB_OUTPUT"
