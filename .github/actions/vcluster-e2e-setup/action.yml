---
name: vCluster E2E Setup
description: Provision a k3d cluster with a vCluster for E2E testing

inputs:
  run-id:
    description: 'Unique ID for this run (use github.run_id)'
    required: true
  vcluster-version:
    description: 'vCluster chart version'
    required: false
    default: '0.32.1'
  k3d-version:
    description: 'k3d version to install'
    required: false
    default: 'v5.7.4'

outputs:
  vcluster-name:
    description: 'Name of the provisioned vCluster'
    value: ${{ steps.setup.outputs.vcluster-name }}

runs:
  using: composite
  steps:
    - name: Install k3d
      shell: bash
      run: |
        set -euo pipefail
        k3d_version="${{ inputs.k3d-version }}"
        if [[ ! "$k3d_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: k3d-version must match vX.Y.Z (got: $k3d_version)" >&2
          exit 1
        fi
        base_url="https://raw.githubusercontent.com/k3d-io/k3d"
        installer="${base_url}/${k3d_version}/install.sh"
        tmp_script="$(mktemp /tmp/k3d-install.XXXXXX)"
        trap 'rm -f "$tmp_script"' EXIT
        curl -fsSL "$installer" -o "$tmp_script"
        chmod 600 "$tmp_script"
        sudo -n env TAG="$k3d_version" bash "$tmp_script"

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Setup k3d cluster and vCluster
      id: setup
      shell: bash
      env:
        RUN_ID: ${{ inputs.run-id }}
        VCLUSTER_VERSION: ${{ inputs.vcluster-version }}
      run: |
        set -euo pipefail
        cluster="e2e-${RUN_ID}"
        k3d cluster create "$cluster" --no-lb --wait
        manager="${{ github.action_path }}"/../../../scripts/k3d-manager
        "$manager" vcluster_install_cli
        "$manager" vcluster_create "$cluster"
        "$manager" vcluster_use "$cluster"
        echo "vcluster-name=$cluster" >> "$GITHUB_OUTPUT"
