name: Setup CI Dependencies
description: Install bats, shellcheck, and yamllint
runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y bats shellcheck python3-pip

    - name: Install yamllint
      shell: bash
      run: |
        set -euo pipefail
        python3 -m pip install --user yamllint
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
