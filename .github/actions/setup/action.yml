name: Setup CI Dependencies
description: Install bats, shellcheck, and yamllint
runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y shellcheck python3-pip

    - name: Install bats 1.11.0
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL https://github.com/bats-core/bats-core/archive/refs/tags/v1.11.0.tar.gz \
          | tar -xz -C /tmp
        sudo /tmp/bats-core-1.11.0/install.sh /usr/local

    - name: Install yamllint
      shell: bash
      run: |
        set -euo pipefail
        python3 -m pip install --user yamllint
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
