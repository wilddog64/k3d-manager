---
name: vCluster E2E Teardown
description: Destroy the vCluster and k3d cluster created by vcluster-e2e-setup

inputs:
  run-id:
    description: 'Same run-id passed to vcluster-e2e-setup'
    required: true

runs:
  using: composite
  steps:
    - name: Check dependencies
      shell: bash
      run: |
        set -euo pipefail
        for cmd in kubectl k3d; do
          if ! command -v "$cmd" &>/dev/null; then
            echo "Error: $cmd missing; run with the vcluster-e2e-setup job." >&2
            exit 1
          fi
        done

    - name: Teardown vCluster and k3d cluster
      shell: bash
      env:
        RUN_ID: ${{ inputs.run-id }}
      run: |
        set -euo pipefail
        cluster="e2e-${RUN_ID}"
        kubectl config use-context "k3d-${cluster}" || true
        manager="${{ github.action_path }}"/../../../scripts/k3d-manager
        "$manager" vcluster_destroy "$cluster" || true
        k3d cluster delete "$cluster" || true
