---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: cicd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: argocd-oidc-secret
    app.kubernetes.io/part-of: argocd
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: argocd-secret
          app.kubernetes.io/instance: argocd-secret
          app.kubernetes.io/component: argocd-credentials
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: oidc.keycloak.clientSecret
      remoteRef:
        key: secret/data/keycloak/clients
        property: argocd_client_secret
