---
name: CI

"on":
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: >-
      ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install chromium --with-deps

      - name: Run fixture tests
        shell: bash
        run: npx playwright test --config playwright.config.js

  lint:
    if: >-
      ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup

      - name: Run shellcheck
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find scripts -type f -name '*.sh' \
              -not -path 'scripts/lib/foundation/*' \
              -exec awk 'FNR==1 && /^#!.*bash/ {print FILENAME}' {} +
          )
          if [[ ${#files[@]} -gt 0 ]]; then
            shellcheck -S error "${files[@]}"
          fi

      - name: Run shellcheck on bin/ scripts
        shell: bash
        run: |
          set -euo pipefail
          shellcheck -S warning bin/acg-credential-test bin/acg-extend-test

      - name: Run node syntax checks
        shell: bash
        run: |
          set -euo pipefail
          find playwright -type f -name '*.js' -print0 |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Run yamllint on workflow files
        shell: bash
        run: |
          set -euo pipefail
          yamllint .github/workflows/*.yml
