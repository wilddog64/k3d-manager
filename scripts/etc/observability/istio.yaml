apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: observability-gateway
  namespace: monitoring
  labels:
    managed-by: k3d-manager
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http-prometheus
        protocol: HTTP
      hosts:
        - prometheus.3ai-talk.org
    - port:
        number: 80
        name: http-grafana
        protocol: HTTP
      hosts:
        - grafana.3ai-talk.org
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: prometheus
  namespace: monitoring
spec:
  hosts:
    - prometheus.3ai-talk.org
  gateways:
    - monitoring/observability-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: kube-prometheus-stack-prometheus.monitoring.svc.cluster.local
            port:
              number: 9090
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana
  namespace: monitoring
spec:
  hosts:
    - grafana.3ai-talk.org
  gateways:
    - monitoring/observability-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: kube-prometheus-stack-grafana.monitoring.svc.cluster.local
            port:
              number: 80
