apiVersion: v1
kind: ConfigMap
metadata:
  name: k3dm-deployment-metrics
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  k3dm-deployments.json: |
    {
      "title": "k3dm Deployment Metrics",
      "uid": "k3dm-deployments",
      "tags": ["k3dm"],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Last acg-up Duration",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 1800 },
                { "color": "red", "value": 3600 }
              ]}
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P5A1115AEDF367D43" },
            "expr": "k3dm_deployment_duration_seconds{action=\"up\"}",
            "legendFormat": "{{provider}} ({{status}})"
          }]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Last acg-down Duration",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 600 },
                { "color": "red", "value": 1200 }
              ]}
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P5A1115AEDF367D43" },
            "expr": "k3dm_deployment_duration_seconds{action=\"down\"}",
            "legendFormat": "{{provider}} ({{status}})"
          }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Last Deployment Success",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "FAILED", "color": "red" }, "1": { "text": "SUCCESS", "color": "green" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P5A1115AEDF367D43" },
            "expr": "k3dm_deployment_success",
            "legendFormat": "{{action}}/{{provider}}"
          }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Last Deployment Time",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "value" },
          "fieldConfig": {
            "defaults": {
              "unit": "dateTimeFromNow",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P5A1115AEDF367D43" },
            "expr": "k3dm_deployment_last_timestamp_seconds * 1000",
            "legendFormat": "{{action}}/{{provider}}"
          }]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Deployment Duration Over Time",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "options": { "tooltip": { "mode": "multi" } },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P5A1115AEDF367D43" },
            "expr": "k3dm_deployment_duration_seconds",
            "legendFormat": "{{action}}/{{provider}} ({{status}})"
          }]
        }
      ]
    }
