apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater-pull-secret
  namespace: shopping-cart-apps
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["ghcr-pull-secret"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater-pull-secret
  namespace: shopping-cart-apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-image-updater-pull-secret
subjects:
  - kind: ServiceAccount
    name: argocd-image-updater
    namespace: cicd
