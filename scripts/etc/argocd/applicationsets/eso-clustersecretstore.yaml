apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: eso-clustersecretstore
  namespace: ${ARGOCD_NAMESPACE}
  labels:
    managed-by: k3d-manager
    app-type: platform
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            k3d-manager/role: app-cluster
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  template:
    metadata:
      name: '{{.name}}-eso-css'
      labels:
        cluster: '{{.name}}'
        app-type: platform
    spec:
      project: platform
      destination:
        server: '{{.server}}'
        namespace: secrets
      source:
        repoURL: https://github.com/wilddog64/k3d-manager
        targetRevision: '${K3D_MANAGER_BRANCH}'
        path: platform/eso-clustersecretstore
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
