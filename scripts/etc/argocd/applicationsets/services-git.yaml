apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services-git
  namespace: ${ARGOCD_NAMESPACE}
  labels:
    managed-by: k3d-manager
    app-type: services
spec:
  generators:
    - git:
        repoURL: https://github.com/wilddog64/k3d-manager
        revision: main
        directories:
          - path: services/*
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  template:
    metadata:
      name: '{{.path.basename}}'
      labels:
        app-type: service
        discovered-from: git
    spec:
      project: platform
      destination:
        name: ubuntu-k3s
        namespace: shopping-cart-apps
      source:
        repoURL: https://github.com/wilddog64/k3d-manager
        targetRevision: main
        path: '{{.path.path}}'
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: payment-db-credentials
          jsonPointers:
            - /data
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
