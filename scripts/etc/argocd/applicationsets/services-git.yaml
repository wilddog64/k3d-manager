apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services-git
  namespace: ${ARGOCD_NAMESPACE}
  labels:
    managed-by: k3d-manager
    app-type: services
spec:
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/source/kustomize/images
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/wilddog64/k3d-manager
              revision: '${K3D_MANAGER_BRANCH}'
              directories:
                - path: services/*
                - path: services/shopping-cart-identity
                  exclude: true
          - clusters:
              selector:
                matchLabels:
                  k3d-manager/role: app-cluster
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  template:
    metadata:
      name: '{{.path.basename}}'
      labels:
        app-type: service
        discovered-from: git
      annotations:
        argocd-image-updater.argoproj.io/image-list: >-
          {{- if eq .path.basename "shopping-cart-product-catalog"}}catalog=ghcr.io/wilddog64/shopping-cart-product-catalog:latest{{end}}
        argocd-image-updater.argoproj.io/catalog.update-strategy: >-
          {{- if eq .path.basename "shopping-cart-product-catalog"}}digest{{end}}
        argocd-image-updater.argoproj.io/write-back-method: >-
          {{- if eq .path.basename "shopping-cart-product-catalog"}}argocd{{end}}
    spec:
      project: shopping-cart
      destination:
        name: '{{.name}}'
        namespace: shopping-cart-apps
      source:
        repoURL: https://github.com/wilddog64/k3d-manager
        targetRevision: '${K3D_MANAGER_BRANCH}'
        path: '{{.path.path}}'
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: payment-db-credentials
          namespace: shopping-cart-payment
          jsonPointers:
            - /data/username
            - /data/password
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.refreshInterval
        - group: ""
          kind: Secret
          name: order-service-secrets
          namespace: shopping-cart-apps
          jsonPointers:
            - /data
            - /metadata/labels
            - /metadata/ownerReferences
        - group: ""
          kind: ConfigMap
          name: product-catalog-seed-script
          namespace: shopping-cart-apps
          jsonPointers:
            - /data
            - /metadata/labels
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
