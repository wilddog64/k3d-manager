apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-rollout
  namespace: cicd
  labels:
    managed-by: k3d-manager
    app-type: demo
spec:
  generators:
    - list:
        elements:
          - environment: dev
            namespace: default
          - environment: staging
            namespace: staging
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  template:
    metadata:
      name: 'rollout-demo-{{.namespace}}'
      labels:
        environment: '{{.environment}}'
    spec:
      project: platform
      source:
        repoURL: https://github.com/wilddog64/k3d-manager
        targetRevision: HEAD
        path: scripts/etc/argocd
        directory:
          include: sample-rollout.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
