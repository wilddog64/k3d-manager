apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-argocd
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: kube-prometheus-stack
data:
  argocd-image-updater-hub.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"cicd\",deployment=\"argocd-image-updater\"}",
              "refId": "A"
            }
          ],
          "title": "Image Updater Ready Replicas",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"cicd\",deployment=\"argocd-image-updater\"}",
              "refId": "A"
            }
          ]
          ,
          "title": "Image Updater Desired Replicas",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 3,
          "title": "Watched App Sync Activity (5m increase)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (name) (increase(argocd_app_sync_total{name=~\"shopping-cart-(basket|order|product-catalog)\"}[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 4,
          "title": "Watched App Health / Sync",
          "type": "table",
          "targets": [
            {
              "expr": "argocd_app_info{name=~\"shopping-cart-(basket|order|product-catalog)\"}",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 5,
          "title": "Possible Flapping (30m syncs)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (name) (increase(argocd_app_sync_total{name=~\"shopping-cart-(basket|order|product-catalog)\"}[30m]))",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "id": 6,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "expr": "{namespace=\"cicd\",pod=~\"argocd-image-updater.*\"} |= \"Processing results:\"",
              "refId": "A"
            }
          ],
          "title": "Image Updater Processing Results",
          "type": "logs"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 24 },
          "id": 7,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "sum(increase(kube_job_status_succeeded{namespace=\"platform-ops\",job_name=~\"app-cve-scan.*\"}[30d]))",
              "refId": "A"
            }
          ],
          "title": "App CVE Scan Successful Jobs",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 24 },
          "id": 8,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "sum(increase(kube_job_status_failed{namespace=\"platform-ops\",job_name=~\"app-cve-scan.*\"}[30d]))",
              "refId": "A"
            }
          ],
          "title": "App CVE Scan Failed Jobs",
          "type": "stat"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "id": 9,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "expr": "{namespace=\"platform-ops\",pod=~\"app-cve-scan.*\"} |= \"[app-cve-scan]\"",
              "refId": "A"
            }
          ],
          "title": "App CVE Scan Decisions",
          "type": "logs"
        }
      ],
      "schemaVersion": 39,
      "tags": ["argocd", "image-updater"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "",
      "title": "ArgoCD Apps & Image Updater Hub",
      "uid": "argocd-image-updater-hub"
    }
