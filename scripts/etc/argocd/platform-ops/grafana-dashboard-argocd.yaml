apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-argocd
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: kube-prometheus-stack
data:
  argocd-image-updater.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "title": "ArgoCD App Health / Sync",
          "type": "table",
          "targets": [
            { "expr": "argocd_app_info", "format": "table", "instant": true, "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "title": "App Sync Activity (5m increase) — image-updater commits trigger syncs",
          "type": "timeseries",
          "targets": [
            { "expr": "sum by (name) (increase(argocd_app_sync_total[5m]))", "refId": "A" }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["argocd", "image-updater"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "label": "Datasource",
            "name": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "",
      "title": "ArgoCD Apps & Image Updater",
      "uid": "argocd-image-updater"
    }
