apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/wilddog64/shopping-cart-product-catalog//k8s/base?ref=main
patches:
  - patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: product-catalog
      imagePullSecrets:
        - name: ghcr-pull-secret
    target:
      kind: ServiceAccount
      name: product-catalog
