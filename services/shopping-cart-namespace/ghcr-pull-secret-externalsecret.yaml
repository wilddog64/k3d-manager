---
# ExternalSecret for the ghcr.io image pull secret used by shopping-cart-apps.
# Keeps the registry auth alive when the namespace is recreated by ArgoCD.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: shopping-cart-apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: ghcr-pull-secret
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      metadata:
        labels:
          app.kubernetes.io/name: ghcr-pull-secret
          app.kubernetes.io/part-of: shopping-cart
      data:
        .dockerconfigjson: |
          {{- $auth := printf "%s:%s" "wilddog64" .token | b64enc -}}
          {{- printf "{\"auths\":{\"ghcr.io\":{\"auth\":\"%s\"}}}" $auth -}}
  data:
    - secretKey: token
      remoteRef:
        key: secret/data/github/pat
        property: token
