---
# ExternalSecret: merge real Postgres credentials into payment-db-credentials.
# The upstream secret.yaml has CHANGE_ME placeholders; this ESO overlays only
# the DB username/password from Vault. RABBITMQ_* keys are left as-is (guest/CHANGE_ME
# is the actual RabbitMQ credential since the broker was initialized with that secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-db-credentials-eso
  namespace: shopping-cart-payment
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: payment-db-credentials
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: payment-db-credentials
    creationPolicy: Merge
    template:
      type: Opaque
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/payment
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/payment
        property: password
